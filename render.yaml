services:
  - type: web
    name: lakzee-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: "https://your-vercel-domain.vercel.app"
      - key: DATABASE_URL
        value: "file:./dev.db"
